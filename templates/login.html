{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 400px; margin: 4rem auto;">
    <div class="dash-card">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary);">Login</h2>
        <form method="post" action="/login" style="display: flex; flex-direction: column; gap: 1rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required style="margin-bottom: 0;">
            </div>

            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Password</label>
                <input type="password" name="password" placeholder="Enter your password" required style="margin-bottom: 0;">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="reset" class="btn btn-secondary" style="flex: 1; background: #9ca3af;">Clear</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">Login</button>
            </div>
            
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="/register" style="color: var(--primary); font-weight: bold; text-decoration: none;">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
