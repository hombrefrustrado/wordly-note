{% extends "base.html" %}

{% block title %}Learn{% endblock %}

{% block content %}
<div class="learn-setup-container">
    <div class="dash-card">
        <h2>Start Learning</h2>
        <p>Select a language and a topic to start your flashcard session.</p>
        
        <form action="/learn" method="GET" class="learn-form">
            <div class="form-group">
                <label for="language_id">Language</label>
                <select name="language_id" id="language_id" required>
                    <option value="" disabled selected>Choose a language</option>
                    {% for lang in user_languages %}
                    <option value="{{ lang.id }}">{{ lang.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="topic">Topic</label>
                <select name="topic" id="topic" required>
                    <option value="" disabled selected>Choose a language first</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary btn-large">Start Session</button>
        </form>
    </div>
</div>

<script>
    const topicsByLanguage = {{ topics_by_language | tojson | safe }};
    
    document.addEventListener("DOMContentLoaded", () => {
        const langSelect = document.getElementById("language_id");
        const topicSelect = document.getElementById("topic");
        
        langSelect.addEventListener("change", (e) => {
            const langId = e.target.value;
            const topics = topicsByLanguage[langId] || [];
            
            // Clear current options
            topicSelect.innerHTML = '<option value="" disabled selected>Choose a topic</option>';
            
            topics.forEach(topic => {
                const opt = document.createElement("option");
                opt.value = topic;
                opt.textContent = topic;
                topicSelect.appendChild(opt);
            });
        });
    });
</script>
{% endblock %}
